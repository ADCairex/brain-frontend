name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/adcairex/brain-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          # VITE_API_URL se hornea en el bundle durante el build
          build-args: |
            VITE_API_URL=https://api.cairex-brain.com
